site_name: jordy_support
site_description: "Providing free insights on Agentic AI and Developing Automation Pipelines :3"
site_url: https://jordysupport.github.io/
repo_url: https://github.com/jordysupport/jordysupport.github.io
repo_name: jordysupport/jordysupport.github.io

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Agentic AI: agentic/index.md
  - Automation Pipelines: pipelines/index.md
  - Setup Help:
      - Windows gotchas: setup/windows.md
      - Mac gotchas: setup/mac.md
      - Troubleshooting: setup/troubleshooting.md
  - Prompts: prompts/index.md
  - Jared Rhod: jared/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jordysupport
    - icon: simple/kofi
      link: https://ko-fi.com/support_jordy
    - icon: simple/linktree
      link: https://linktr.ee/jordy_support

copyright: >
  jordy_support — free forever.
  <a href="https://ko-fi.com/support_jordy">Tip on Ko-fi</a> ·
  <a href="https://linktr.ee/jordy_support">linktr.ee/jordy_support</a>
