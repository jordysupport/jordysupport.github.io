  - Home: index.md
  - VALE:
      - Download VALE: vale/index.md
      - Watch the Demo: vale/demo.md
  - Start Here:
      - Start Here: getting-started/index.md
      - Choose Your Setup: getting-started/choose-a-setup.md
      - Your First Agent: getting-started/first-agent.md
  - How Agents Work:
      - The Basics: fundamentals/index.md
      - The Agent Loop: fundamentals/agent-loop.md
      - Context & Memory: fundamentals/context-memory.md
      - A Vault for Your Agent: fundamentals/obsidian-vaults.md
      - Subagents: fundamentals/subagents.md
      - Tools & Connections: fundamentals/tools-mcp.md
      - Keeping It Safe: fundamentals/safety-permissions.md
  - Tokenomics: tokenomics.md
  - Prompting:
      - Prompting That Works: prompting/index.md
      - Prompt Builder: prompting/prompt-builder.md
      - Project Instructions: prompting/system-instructions.md
      - Prompt Library: prompting/prompt-library.md
  - Automation:
      - Automation Basics: automation/index.md
      - Plan a Workflow: automation/workflow-blueprint.md
      - Make It Reliable: automation/reliability.md
      - Ideas to Steal: automation/ideas.md
  - Playbooks:
      - How Playbooks Work: playbooks/index.md
