site_name: Jordy Support
site_description: "Free, plain-English guides to agentic AI and automation pipelines."
site_url: https://jordysupport.com/
repo_url: https://github.com/jordysupport/jordysupport.github.io
repo_name: jordysupport/jordysupport.github.io
edit_uri: edit/main/docs/

copyright: >-
  Jordy Support — practical AI help, free to use.
  <a href="https://ko-fi.com/support_jordy">Support on Ko-fi</a> ·
  <a href="https://linktr.ee/jordy_support">All links</a>

theme:
  name: material
  language: en
  icon:
    logo: material/toolbox-outline
    repo: fontawesome/brands/github
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - toc.follow
    - content.code.copy

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jordysupport
      name: Jordy Support on GitHub
    - icon: material/coffee-outline
      link: https://ko-fi.com/support_jordy
      name: Support Jordy on Ko-fi
    - icon: material/link-variant
      link: https://linktr.ee/jordy_support
      name: Jordy Support links

